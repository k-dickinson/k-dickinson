<svg xmlns="http://www.w3.org/2000/svg" width="820" height="352" viewBox="0 0 820 352" font-family="'SFMono-Regular', 'SF Mono', 'Cascadia Code', 'JetBrains Mono', Menlo, Consolas, monospace" role="img" aria-label="evaltrust audit of k-dickinson: reject H0, p below 0.001, statistically significant">
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="18" flood-color="#000000" flood-opacity="0.45"/>
    </filter>
    <clipPath id="cmdClip">
      <rect x="26" y="66" width="0" height="24">
        <animate attributeName="width" from="0" to="470" dur="1.15s" begin="0.3s" fill="freeze" calcMode="linear"/>
      </rect>
    </clipPath>
    <clipPath id="win">
      <rect x="10" y="10" width="800" height="332" rx="12"/>
    </clipPath>
  </defs>

  <!-- window -->
  <g filter="url(#shadow)">
    <rect x="10" y="10" width="800" height="332" rx="12" fill="#0d1117" stroke="#30363d" stroke-width="1"/>
    <g clip-path="url(#win)">
      <!-- title bar -->
      <rect x="10" y="10" width="800" height="40" fill="#161b22"/>
      <line x1="10" y1="50" x2="810" y2="50" stroke="#21262d" stroke-width="1"/>
      <circle cx="34" cy="30" r="6" fill="#ff5f56"/>
      <circle cx="54" cy="30" r="6" fill="#febc2e"/>
      <circle cx="74" cy="30" r="6" fill="#27c93f"/>
      <text x="410" y="34" text-anchor="middle" font-size="12.5" fill="#8b949e">evaltrust — audit · k-dickinson</text>
    </g>
  </g>

  <!-- command (typewriter reveal via clip) -->
  <g clip-path="url(#cmdClip)" font-size="14.5">
    <text x="26" y="83" xml:space="preserve"><tspan fill="#3fb950">$ </tspan><tspan fill="#c9d1d9">evaltrust audit </tspan><tspan fill="#8b949e">--profile </tspan><tspan fill="#a5d6ff">k-dickinson </tspan><tspan fill="#8b949e">--alpha </tspan><tspan fill="#f0883e">0.05</tspan></text>
  </g>
  <!-- typing caret -->
  <rect x="34" y="70" width="8" height="17" fill="#3fb950">
    <animate attributeName="x" from="34" to="497" dur="1.15s" begin="0.3s" fill="freeze" calcMode="linear"/>
    <animate attributeName="opacity" from="1" to="0" begin="1.6s" dur="0.15s" fill="freeze"/>
  </rect>

  <!-- output lines (printed in sequence) -->
  <g font-size="14.5">
    <g opacity="0">
      <animate attributeName="opacity" from="0" to="1" begin="1.7s" dur="0.15s" fill="freeze"/>
      <text x="26" y="127" xml:space="preserve"><tspan fill="#6e7681">  H0: </tspan><tspan fill="#c9d1d9">Kyle </tspan><tspan fill="#3fb950">=</tspan><tspan fill="#c9d1d9"> average math major</tspan></text>
    </g>
    <g opacity="0">
      <animate attributeName="opacity" from="0" to="1" begin="1.95s" dur="0.15s" fill="freeze"/>
      <text x="26" y="151" xml:space="preserve"><tspan fill="#6e7681">  H1: </tspan><tspan fill="#c9d1d9">Kyle </tspan><tspan fill="#f85149">≠</tspan><tspan fill="#c9d1d9"> average math major</tspan></text>
    </g>

    <g opacity="0">
      <animate attributeName="opacity" from="0" to="1" begin="2.3s" dur="0.15s" fill="freeze"/>
      <text x="26" y="195" xml:space="preserve"><tspan fill="#8b949e">  running </tspan><tspan fill="#c9d1d9">McNemar · permutation · TOST · power</tspan><tspan fill="#8b949e"> …</tspan></text>
    </g>

    <!-- progress bar -->
    <g opacity="0">
      <animate attributeName="opacity" from="0" to="1" begin="2.55s" dur="0.15s" fill="freeze"/>
      <text x="26" y="223" xml:space="preserve" fill="#484f58">  [</text>
      <rect x="52" y="212" width="220" height="13" rx="3" fill="#21262d"/>
      <rect x="52" y="212" width="0" height="13" rx="3" fill="#3fb950">
        <animate attributeName="width" from="0" to="220" dur="1.05s" begin="2.7s" fill="freeze" calcMode="linear"/>
      </rect>
      <text x="278" y="223" xml:space="preserve" fill="#484f58">]</text>
      <text x="292" y="223" xml:space="preserve" fill="#8b949e">n = 497 contributions</text>
    </g>

    <!-- verdict -->
    <g opacity="0">
      <animate attributeName="opacity" from="0" to="1" begin="3.95s" dur="0.2s" fill="freeze"/>
      <text x="26" y="267" xml:space="preserve"><tspan fill="#3fb950">  ▸ reject H0</tspan><tspan fill="#8b949e">    p </tspan><tspan fill="#c9d1d9">&lt;</tspan><tspan fill="#f0883e"> 0.001</tspan><tspan fill="#8b949e">    effect size </tspan><tspan fill="#c9d1d9">large</tspan></text>
    </g>
    <g opacity="0">
      <animate attributeName="opacity" from="0" to="1" begin="4.25s" dur="0.2s" fill="freeze"/>
      <text x="26" y="295" xml:space="preserve"><tspan fill="#8b949e">  verdict: </tspan><tspan fill="#3fb950" font-weight="bold">statistically significant ✓</tspan></text>
    </g>

    <!-- ready prompt + blinking cursor -->
    <g opacity="0">
      <animate attributeName="opacity" from="0" to="1" begin="4.5s" dur="0.15s" fill="freeze"/>
      <text x="26" y="323" xml:space="preserve"><tspan fill="#3fb950">$ </tspan></text>
      <rect x="42" y="310" width="8" height="17" fill="#c9d1d9">
        <animate attributeName="opacity" values="1;1;0;0" keyTimes="0;0.5;0.5;1" dur="1.1s" begin="4.65s" repeatCount="indefinite"/>
      </rect>
    </g>
  </g>
</svg>
