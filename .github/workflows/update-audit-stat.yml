name: update-audit-stat

# Keeps the "n = N commits" figure in the audit terminal SVG in sync with the
# owner's total authored commits. Runs daily and on manual trigger.

on:
  schedule:
    - cron: '17 6 * * *'   # ~06:17 UTC daily
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fetch authored commit count
        # PR_COUNT_TOKEN (a PAT with 'repo' scope) sees private commits too;
        # falls back to the built-in token (public commits only) if unset.
        env:
          GH_TOKEN: ${{ secrets.PR_COUNT_TOKEN || secrets.GITHUB_TOKEN }}
        run: |
          count=$(gh api -X GET search/commits \
            -f q="author:${{ github.repository_owner }}" \
            --jq '.total_count')
          echo "authored commits: $count"
          echo "COMMIT_COUNT=$count" >> "$GITHUB_ENV"

      - name: Update SVG figure
        run: |
          sed -i -E "s/n = [0-9]+ commits/n = ${COMMIT_COUNT} commits/" assets/audit-terminal.svg

      - name: Commit if changed
        run: |
          if git diff --quiet -- assets/audit-terminal.svg; then
            echo "commit count unchanged — nothing to commit."
            exit 0
          fi
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add assets/audit-terminal.svg
          git commit -m "chore: refresh audit commit count to ${COMMIT_COUNT} [skip ci]"
          git push
