name: update-audit-stat

# Keeps the "n = N commits" figure in the audit terminal SVG in sync with the
# owner's TOTAL commits across every repo they own or contribute to. Runs daily
# and on manual trigger. Requires the PR_COUNT_TOKEN secret (a PAT with 'repo'
# scope) to enumerate private/collaborator repositories.

on:
  schedule:
    - cron: '17 6 * * *'   # ~06:17 UTC daily
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Count total commits
        env:
          GH_TOKEN: ${{ secrets.PR_COUNT_TOKEN }}
        run: |
          if [ -z "$GH_TOKEN" ]; then
            echo "PR_COUNT_TOKEN not set — need it to enumerate repos. Skipping."
            echo "SKIP=1" >> "$GITHUB_ENV"; exit 0
          fi
          total=$(bash scripts/count-commits.sh "${{ github.repository_owner }}")
          echo "total commits: $total"
          if [ "${total:-0}" -le 0 ]; then
            echo "Got 0 — likely a token/API issue. Skipping to avoid a bad write."
            echo "SKIP=1" >> "$GITHUB_ENV"; exit 0
          fi
          echo "COMMIT_COUNT=$total" >> "$GITHUB_ENV"

      - name: Update SVG figure
        if: env.SKIP != '1'
        run: |
          sed -i -E "s/n = [0-9]+ commits/n = ${COMMIT_COUNT} commits/" assets/audit-terminal.svg

      - name: Commit if changed
        if: env.SKIP != '1'
        run: |
          if git diff --quiet -- assets/audit-terminal.svg; then
            echo "commit count unchanged — nothing to commit."
            exit 0
          fi
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add assets/audit-terminal.svg
          git commit -m "chore: refresh total commit count to ${COMMIT_COUNT} [skip ci]"
          git push
