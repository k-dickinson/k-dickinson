name: update-audit-stat

# Keeps the "n = N contributions" figure in the audit terminal SVG in sync with
# the owner's total contributions over the last year (the exact number shown on
# the profile graph). Reads the public contributions endpoint — no token needed,
# since "Include private contributions on my profile" is enabled.

on:
  schedule:
    - cron: '25 * * * *'   # hourly (~:25 past the hour)
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Count contributions (last year)
        run: |
          total=$(bash scripts/count-contributions.sh "${{ github.repository_owner }}")
          echo "contributions: $total"
          if [ "${total:-0}" -le 0 ]; then
            echo "Got 0 — likely a fetch/parse issue. Skipping to avoid a bad write."
            echo "SKIP=1" >> "$GITHUB_ENV"; exit 0
          fi
          echo "CONTRIB_COUNT=$total" >> "$GITHUB_ENV"

      - name: Update SVG figure
        if: env.SKIP != '1'
        run: |
          sed -i -E "s/n = [0-9]+ (contributions|commits)/n = ${CONTRIB_COUNT} contributions/" assets/audit-terminal.svg

      - name: Commit if changed
        if: env.SKIP != '1'
        run: |
          if git diff --quiet -- assets/audit-terminal.svg; then
            echo "contribution count unchanged — nothing to commit."
            exit 0
          fi
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add assets/audit-terminal.svg
          git commit -m "chore: refresh audit contribution count to ${CONTRIB_COUNT} [skip ci]"
          git push
